
<style>
  .container { max-width: 480px; margin: 2rem auto; padding: 0 1rem; }
  .card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.5rem; }
  .label { font-size: 13px; color: var(--color-text-secondary); margin: 0 0 6px; }
  .section { margin-bottom: 1.25rem; }
  .slot-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .slot-btn { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 10px 8px; cursor: pointer; text-align: center; font-size: 13px; color: var(--color-text-primary); transition: background 0.15s, border-color 0.15s; }
  .slot-btn:hover { background: var(--color-background-tertiary); }
  .slot-btn.selected { background: var(--color-background-info); border-color: var(--color-border-info); color: var(--color-text-info); }
  .slot-time { font-size: 11px; color: var(--color-text-secondary); margin-top: 3px; }
  .slot-btn.selected .slot-time { color: var(--color-text-info); opacity: 0.8; }
  .create-btn { width: 100%; padding: 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); font-size: 14px; font-weight: 500; color: var(--color-text-primary); cursor: pointer; transition: background 0.15s; }
  .create-btn:hover { background: var(--color-background-secondary); }
  .create-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .signin-btn { width: 100%; padding: 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); font-size: 14px; color: var(--color-text-primary); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .signin-btn:hover { background: var(--color-background-secondary); }
  .status { font-size: 13px; color: var(--color-text-secondary); text-align: center; margin-top: 10px; min-height: 20px; }
  .status.success { color: var(--color-text-success); }
  .status.error { color: var(--color-text-danger); }
  .user-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; font-size: 13px; }
  .signout { font-size: 12px; color: var(--color-text-secondary); cursor: pointer; text-decoration: underline; background: none; border: none; padding: 0; }
  .preview { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 12px; font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1rem; min-height: 36px; }
  h2 { font-size: 16px; font-weight: 500; margin: 0 0 1.25rem; color: var(--color-text-primary); }
</style>

<div class="container">
  <div class="card">
    <h2>Create calendar event</h2>

    <div id="auth-section">
      <p style="font-size:13px;color:var(--color-text-secondary);margin:0 0 1rem;">Sign in with Google to create events in your calendar.</p>
      <button class="signin-btn" onclick="signIn()">
        <svg width="16" height="16" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
        Sign in with Google
      </button>
      <p style="font-size:11px;color:var(--color-text-secondary);margin-top:10px;text-align:center;">Replace CLIENT_ID in the code with your Google OAuth Client ID</p>
    </div>

    <div id="main-section" style="display:none;">
      <div class="user-row">
        <span id="user-name" style="color:var(--color-text-primary);"></span>
        <button class="signout" onclick="signOut()">sign out</button>
      </div>

      <div class="section">
        <p class="label">Date</p>
        <input type="date" id="event-date" style="width:100%;box-sizing:border-box;" oninput="updatePreview()" />
      </div>

      <div class="section">
        <p class="label">Time slot</p>
        <div class="slot-grid">
          <div class="slot-btn" onclick="selectSlot(this,'08:00','16:00')">
            Morning
            <div class="slot-time">8:00 – 16:00</div>
          </div>
          <div class="slot-btn" onclick="selectSlot(this,'10:00','18:00')">
            Mid
            <div class="slot-time">10:00 – 18:00</div>
          </div>
          <div class="slot-btn" onclick="selectSlot(this,'12:00','20:00')">
            Afternoon
            <div class="slot-time">12:00 – 20:00</div>
          </div>
        </div>
      </div>

      <div class="section">
        <p class="label">Event title (optional)</p>
        <input type="text" id="event-title" placeholder="My event" style="width:100%;box-sizing:border-box;" oninput="updatePreview()" />
      </div>

      <div class="preview" id="preview">Pick a date and time slot to preview the event.</div>

      <button class="create-btn" id="create-btn" onclick="createEvent()" disabled>Create event in Google Calendar</button>
      <div class="status" id="status"></div>
    </div>
  </div>
</div>

<script>
const CLIENT_ID = '1060596376056-cfi7o31mifgl2ndaf3iuoahktpl2e99g.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/calendar.events';
let tokenClient, selectedStart, selectedEnd, gapiReady = false, gisReady = false;

function loadGapi() {
  return new Promise(res => {
    const s = document.createElement('script');
    s.src = 'https://apis.google.com/js/api.js';
    s.onload = () => gapi.load('client', async () => {
      await gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest'] });
      gapiReady = true; res();
    });
    document.body.appendChild(s);
  });
}

function loadGis() {
  return new Promise(res => {
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = () => {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID, scope: SCOPES,
        callback: async (resp) => {
          if (resp.error) { setStatus('Sign-in failed: ' + resp.error, 'error'); return; }
          try {
            const info = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
              headers: { Authorization: 'Bearer ' + resp.access_token }
            }).then(r => r.json());
            document.getElementById('user-name').textContent = info.name || info.email;
          } catch(e) {}
          document.getElementById('auth-section').style.display = 'none';
          document.getElementById('main-section').style.display = 'block';
        }
      });
      gisReady = true; res();
    };
    document.body.appendChild(s);
  });
}

Promise.all([loadGapi(), loadGis()]);

function signIn() {
  if (!gapiReady || !gisReady) { setStatus('Still loading, please wait…', ''); return; }
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

function signOut() {
  google.accounts.oauth2.revoke(gapi.client.getToken().access_token, () => {
    gapi.client.setToken('');
    document.getElementById('auth-section').style.display = 'block';
    document.getElementById('main-section').style.display = 'none';
    selectedStart = selectedEnd = null;
    document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('event-date').value = '';
    setStatus('', '');
  });
}

function selectSlot(el, start, end) {
  document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selectedStart = start; selectedEnd = end;
  updatePreview();
}

function updatePreview() {
  const date = document.getElementById('event-date').value;
  const title = document.getElementById('event-title').value.trim() || 'My event';
  const ready = date && selectedStart;
  document.getElementById('create-btn').disabled = !ready;
  if (!ready) { document.getElementById('preview').textContent = 'Pick a date and time slot to preview the event.'; return; }
  const d = new Date(date + 'T' + selectedStart);
  const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
  document.getElementById('preview').innerHTML =
    '<strong style="color:var(--color-text-primary)">' + title + '</strong><br>' +
    d.toLocaleDateString(undefined, opts) + ' · ' + selectedStart + ' – ' + selectedEnd;
}

async function createEvent() {
  const date = document.getElementById('event-date').value;
  const title = document.getElementById('event-title').value.trim() || 'My event';
  if (!date || !selectedStart) return;
  const btn = document.getElementById('create-btn');
  btn.disabled = true; btn.textContent = 'Creating…';
  try {
    await gapi.client.calendar.events.insert({
      calendarId: 'primary',
      resource: {
        summary: title,
        start: { dateTime: date + 'T' + selectedStart + ':00', timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone },
        end:   { dateTime: date + 'T' + selectedEnd   + ':00', timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone }
      }
    });
    setStatus('Event created successfully!', 'success');
  } catch(e) {
    setStatus('Error: ' + (e.result?.error?.message || e.message), 'error');
  }
  btn.disabled = false; btn.textContent = 'Create event in Google Calendar';
}

function setStatus(msg, type) {
  const s = document.getElementById('status');
  s.textContent = msg; s.className = 'status ' + type;
}
</script>
