<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calendar Event Tool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; padding: 1.75rem; width: 100%; max-width: 460px; }
    h2 { font-size: 17px; font-weight: 600; margin-bottom: 1.25rem; color: #111; }
    .label { font-size: 12px; color: #666; margin-bottom: 5px; }
    .section { margin-bottom: 1.1rem; }
    input[type="date"], input[type="text"] { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; color: #111; background: #fff; outline: none; }
    input:focus { border-color: #4285F4; }
    .slot-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .slot-btn { background: #f7f7f7; border: 1px solid #ddd; border-radius: 8px; padding: 10px 6px; cursor: pointer; text-align: center; font-size: 13px; color: #333; transition: all 0.15s; }
    .slot-btn:hover { background: #eef; border-color: #aac; }
    .slot-btn.selected { background: #e8f0fe; border-color: #4285F4; color: #1a56c4; }
    .slot-time { font-size: 11px; color: #999; margin-top: 3px; }
    .slot-btn.selected .slot-time { color: #4285F4; }
    .preview { background: #f9f9f9; border: 1px solid #eee; border-radius: 8px; padding: 10px 12px; font-size: 13px; color: #555; margin-bottom: 1rem; min-height: 40px; line-height: 1.5; }
    .create-btn { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; background: #fff; font-size: 14px; font-weight: 500; color: #111; cursor: pointer; transition: background 0.15s; }
    .create-btn:hover:not(:disabled) { background: #f0f0f0; }
    .create-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .signin-btn { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; background: #fff; font-size: 14px; color: #333; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .signin-btn:hover { background: #f5f5f5; }
    .status-box { margin-top: 12px; padding: 10px 12px; border-radius: 8px; font-size: 13px; line-height: 1.5; display: none; }
    .status-box.show { display: block; }
    .status-box.info    { background: #e8f0fe; color: #1a56c4; border: 1px solid #b3cdf7; }
    .status-box.success { background: #e6f4ea; color: #1e7e34; border: 1px solid #a8d5b0; }
    .status-box.error   { background: #fce8e6; color: #c0392b; border: 1px solid #f5b7b1; }
    .user-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; font-size: 13px; color: #333; }
    .signout-btn { font-size: 12px; color: #888; cursor: pointer; background: none; border: none; text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <h2>Calendar Event Tool v1.0</h2>

  <div id="auth-section">
    <button class="signin-btn" onclick="signIn()">
      <svg width="16" height="16" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/>
        <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/>
      </svg>
      Sign in with Google
    </button>
    <div id="auth-status" style="font-size:13px;color:#c0392b;margin-top:8px;"></div>
  </div>

  <div id="main-section" style="display:none;">
    <div class="user-row">
		<span id="user-name"></span>
		<button class="signout-btn" onclick="signOut()">sign out</button>
    </div>
    <div class="section">
		<p class="label">Selected Calendar:</p>
		<select id="user_calendars" onchange="updateSelectedCalendar()">
		<option value="" disabled selected>...</option>
		</select>
    </div>
	<div class="section" style="display: flex; gap: 10px; align-items: center;">
	  <div>
		<label for="year">Year:</label>
		<select id="year"></select>
	  </div>
	  <div>
		<label for="week">Week:</label>
		<select id="week"></select>
	  </div>
	</div>
    <div class="section">
		<p class="label">Weekdays</p>
		<div id="weekdays-container"></div>
	</div>
    <button class="create-btn" id="create-btn" onclick="createCalendarEvent()" disabled>Create events!</button>
    <div class="status-box" id="status-box"></div>
  </div>
</div>

<script>
  const CLIENT_ID = '1060596376056-cfi7o31mifgl2ndaf3iuoahktpl2e99g.apps.googleusercontent.com';
  const SCOPES = 'https://www.googleapis.com/auth/calendar';
  let tokenClient, gapiReady = false, gisReady = false;
  let selectedStart = null, selectedEnd = null;

  function loadScript(src) {
    return new Promise((resolve) => {
      const s = document.createElement('script');
      s.src = src; s.onload = resolve;
      document.body.appendChild(s);
    });
  }

  async function initGapi() {
    await loadScript('https://apis.google.com/js/api.js');
    await new Promise((resolve) => gapi.load('client', resolve));
    await gapi.client.init({ discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest'] });
    gapiReady = true;
  }

  async function initGis() {
    await loadScript('https://accounts.google.com/gsi/client');
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID, scope: SCOPES, callback: onSignInSuccess
    });
    gisReady = true;
  }

  Promise.all([initGapi(), initGis()]).catch(err => {
    document.getElementById('auth-status').textContent = 'Failed to load Google libraries: ' + err.message;
  });

  function signIn() {
    if (!gapiReady || !gisReady) { document.getElementById('auth-status').textContent = 'Still loading, please wait.'; return; }
    tokenClient.requestAccessToken({ prompt: 'consent' });
  }

	async function loadUserCalendars() {
		const res = await gapi.client.calendar.calendarList.list();
		const calendars = res.result.items;

		const dropdown = document.getElementById("user_calendars");
		dropdown.innerHTML = "";

		calendars.forEach(cal => {
		const option = document.createElement("option");
		option.value = cal.id;
		option.textContent = cal.summary;
		dropdown.appendChild(option);
		});

		// Select first by default
		if (calendars.length > 0) {
		dropdown.value = calendars[0].id;
		}
	}
	
	function initYearWeek() {
		const now = new Date();

		function getISOWeek(date) {
			const temp = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
			temp.setUTCDate(temp.getUTCDate() + 4 - (temp.getUTCDay() || 7));
			const yearStart = new Date(Date.UTC(temp.getUTCFullYear(), 0, 1));
			return Math.ceil((((temp - yearStart) / 86400000) + 1) / 7);
		  }

		  const currentYear = now.getFullYear();
		  const currentWeek = getISOWeek(now);

		  const yearDropdown = document.getElementById("year");
		  const weekDropdown = document.getElementById("week");

		  yearDropdown.innerHTML = "";
		  weekDropdown.innerHTML = "";

		  for (let y = currentYear - 5; y <= currentYear + 5; y++) {
			const opt = new Option(y, y);
			if (y === currentYear) opt.selected = true;
			yearDropdown.appendChild(opt);
		  }

		  for (let w = 1; w <= 53; w++) {
			const opt = new Option("Week " + w, w);
			if (w === currentWeek) opt.selected = true;
			weekDropdown.appendChild(opt);
		  }
	}

  async function onSignInSuccess(response) {
    if (response.error) { document.getElementById('auth-status').textContent = 'Sign-in error: ' + response.error; return; }
    try {
      const u = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { Authorization: 'Bearer ' + response.access_token } }).then(r => r.json());
      document.getElementById('user-name').textContent = u.name || u.email;
    } catch(e) { document.getElementById('user-name').textContent = 'Signed in'; }
    
	await loadUserCalendars();
	initYearWeek();
	generateWeekdays(); // your existing function
	
	document.getElementById('auth-section').style.display = 'none';
    document.getElementById('main-section').style.display = 'block';
  }

  function signOut() {
    const token = gapi.client.getToken();
    if (token) { google.accounts.oauth2.revoke(token.access_token, () => { gapi.client.setToken(null); }); }
    document.getElementById('auth-section').style.display = 'block';
    document.getElementById('main-section').style.display = 'none';
    document.getElementById('event-date').value = '';
    document.getElementById('event-title').value = '';
    document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
    selectedStart = selectedEnd = null;
    setStatus('', '');
  }

  function selectSlot(el, start, end) {
    document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    selectedStart = start; selectedEnd = end;
    updatePreview();
  }

  function updatePreview() {
    const date = document.getElementById('event-date').value;
    const title = document.getElementById('event-title').value.trim() || 'My event';
    const ready = date && selectedStart;
    document.getElementById('create-btn').disabled = !ready;
    if (!ready) { document.getElementById('preview').innerHTML = 'Pick a date and time slot to preview the event.'; return; }
    const d = new Date(date + 'T' + selectedStart);
    const dateStr = d.toLocaleDateString(undefined, { weekday:'long', year:'numeric', month:'long', day:'numeric' });
    document.getElementById('preview').innerHTML = '<strong>' + title + '</strong><br>' + dateStr + ' &nbsp;·&nbsp; ' + selectedStart + ' – ' + selectedEnd;
  }

  async function createCalendarEvent() {
    const selectedCalendar = document.getElementById("user_calendars").value;
	const date = document.getElementById('event-date').value;
    const title = document.getElementById('event-title').value.trim() || 'My event';
    if (!date || !selectedStart) return;
    const btn = document.getElementById('create-btn');
    btn.disabled = true; btn.textContent = 'Creating…';
    setStatus('Creating event…', 'info');
    const timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
    try {
      const response = await gapi.client.calendar.events.insert({
        calendarId: selectedCalendar,
        resource: {
          summary: title,
          start: { dateTime: date + 'T' + selectedStart + ':00', timeZone },
          end:   { dateTime: date + 'T' + selectedEnd   + ':00', timeZone }
        }
      });
      console.log('Created event:', response);
      setStatus('Event created successfully! Check your Google Calendar.', 'success');
    } catch (err) {
      console.error('API error:', err);
      setStatus('Error: ' + (err.result?.error?.message || err.message || 'Unknown error'), 'error');
    }
    btn.disabled = false; btn.textContent = 'Create event in Google Calendar';
  }

  function setStatus(message, type) {
    const box = document.getElementById('status-box');
    box.textContent = message;
    box.className = 'status-box' + (type ? ' show ' + type : '');
  }
</script>
</body>
</html>
